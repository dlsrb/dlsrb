<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function changeImage() {
        let sel = document.getElementById("sel");
        let img = document.getElementById("myImg");
        img.onload = function(){
            let mySpan = document.getElementById("mySpan");
            mySpan.innerHTML = img.width + "x" + img.height;
        }
        let index= sel.selectedIndex;
        img.src = sel.options[index].value;
    }
        // function hideMenu(){
        //     alert("오른쪽 클릭<컨텍스트 메뉴>금지");
        //     return false;
        // }
        // document.oncontextmenu=hideMenu;
    </script>
</head>
<body onload="changeImage()">
<h3>onload로 이미지 크기 출력</h3>
<hr>
<form>
<select id="sel" onchange="changeImage()">
    <option value= "images/사과.jpg">사과
    <option value="images/바나나.jpg">바나나
    <option value="images/lemon.jpg">레몬
</select>
<span id="mySpan">이미지 크기</span>
</form>
<p><img id="myImg" src="media/media/apple.jpg"alt="."></p>
<!-- <h3>oncontextmenu에서 컨텍스트 메뉴 금지</h3>
<hr>
마우스 오른쪽 클릭은 금지됩니다. 아무곳이나 클릭해도 컨텍스트 메뉴를     -->
</body>
</html>
